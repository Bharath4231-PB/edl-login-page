{% extends "admin/base.html" %}
{% load i18n static %}

{% block title %}{{ title }} | Exposys Admin Portal{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}" style="display:flex;align-items:center;gap:10px;color:white;text-decoration:none;">
        <span style="
            width:32px;height:32px;
            background:linear-gradient(135deg,#7c3aed,#a855f7);
            border-radius:8px;
            display:flex;align-items:center;justify-content:center;
            font-size:15px;font-weight:800;color:white;
            flex-shrink:0;
        ">E</span>
        Exposys Admin Portal
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="{% static 'css/admin_style.css' %}" rel="stylesheet">
{% endblock %}

{% block extrascripts %}
{{ block.super }}
<script src="{% static 'js/admin_script.js' %}"></script>
{% endblock %}
